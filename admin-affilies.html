<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Gestion des Affiliés | ADC</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="images/Logo_Carré_blanc_v1.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink: #141414;
      --ink-2: #2E2E2E;
      --ink-3: #5B5B5B;
      --ink-4: #8A8A8A;
      --cream: #F4EFE5;
      --cream-2: #EBE3D2;
      --surface: #FFFFFF;
      --line: #E6DFD0;
      --accent: #E8943A;
      --accent-dark: #C87820;
      --accent-soft: #FBE5C6;
      --success: #1F6B48;
      --success-soft: #DBEFE2;
      --danger: #C0392B;
      --danger-soft: #FADBD8;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-pill: 999px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Auth screen ── */
    .auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 48px 36px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .auth-card h1 {
      font-family: 'Sora', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    .auth-card p {
      font-size: 0.85rem;
      color: var(--ink-3);
      margin-bottom: 24px;
    }
    .auth-card input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      background: var(--cream);
      text-align: center;
      margin-bottom: 16px;
    }
    .auth-card input:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
    .auth-error { color: var(--danger); font-size: 0.8rem; display: none; margin-bottom: 12px; }

    /* ── Main layout ── */
    .admin-app { display: none; }
    .admin-header {
      background: var(--ink);
      color: var(--cream);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-header h1 {
      font-family: 'Sora', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
    }
    .admin-header-actions { display: flex; gap: 10px; }

    .admin-body {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: var(--ink); }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-outline { background: transparent; border: 1px solid var(--line); color: var(--ink-2); }
    .btn-outline:hover { border-color: var(--ink-3); }
    .btn-danger { background: var(--danger-soft); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: white; }
    .btn-sm { padding: 6px 12px; font-size: 0.78rem; }
    .btn-icon { padding: 6px 8px; }

    /* ── Add form ── */
    .add-section {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 28px 24px;
      margin-bottom: 32px;
    }
    .add-section h2 {
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .add-form {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }
    @media (max-width: 700px) {
      .add-form { grid-template-columns: 1fr; }
    }
    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink-3);
      margin-bottom: 4px;
    }
    .field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      background: var(--cream);
      color: var(--ink);
    }
    .field input:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
    .slug-preview {
      font-size: 0.75rem;
      color: var(--ink-4);
      margin-top: 4px;
      word-break: break-all;
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px 24px;
      flex: 1;
      min-width: 140px;
    }
    .stat-card-number {
      font-family: 'Sora', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-card-label {
      font-size: 0.75rem;
      color: var(--ink-4);
      margin-top: 2px;
    }

    /* ── Table ── */
    .table-section {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid var(--line);
    }
    .table-header h2 {
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 700;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: left;
      padding: 10px 16px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ink-4);
      border-bottom: 1px solid var(--line);
      background: var(--cream);
    }
    td {
      padding: 12px 16px;
      font-size: 0.85rem;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(232, 148, 58, 0.03); }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      font-size: 0.72rem;
      font-weight: 600;
    }
    .status-actif { background: var(--success-soft); color: var(--success); }
    .status-inactif { background: var(--danger-soft); color: var(--danger); }

    .link-cell {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .link-cell code {
      font-size: 0.78rem;
      background: var(--cream);
      padding: 3px 8px;
      border-radius: 4px;
      color: var(--ink-2);
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .copy-btn {
      background: none;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 4px 6px;
      cursor: pointer;
      color: var(--ink-3);
      font-size: 0.75rem;
      transition: all 0.2s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: var(--success); color: var(--success); }

    .actions-cell { display: flex; gap: 6px; }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--ink-4);
    }
    .empty-state p { font-size: 0.9rem; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--ink);
      color: var(--cream);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 500;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 1000;
    }
    .toast.visible { transform: translateY(0); opacity: 1; }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      th:nth-child(4), td:nth-child(4),
      th:nth-child(5), td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

  <!-- ============================================
       AUTH SCREEN
       ============================================ -->
  <div class="auth-screen" id="auth-screen">
    <div class="auth-card">
      <h1>Admin Affilies</h1>
      <p>Entrez le mot de passe administrateur</p>
      <div class="auth-error" id="auth-error">Mot de passe incorrect</div>
      <input type="password" id="auth-password" placeholder="Mot de passe" autofocus>
      <button class="btn btn-primary" onclick="attemptLogin()" style="width:100%">Accéder</button>
    </div>
  </div>

  <!-- ============================================
       MAIN APP
       ============================================ -->
  <div class="admin-app" id="admin-app">

    <div class="admin-header">
      <h1>Gestion des Affilies — ADC</h1>
      <div class="admin-header-actions">
        <button class="btn btn-outline btn-sm" onclick="exportCSV()" style="color: var(--cream); border-color: rgba(244,239,229,0.2);">Exporter CSV</button>
        <button class="btn btn-outline btn-sm" onclick="importData()" style="color: var(--cream); border-color: rgba(244,239,229,0.2);">Importer JSON</button>
        <button class="btn btn-outline btn-sm" onclick="logout()" style="color: var(--cream); border-color: rgba(244,239,229,0.2);">Deconnexion</button>
      </div>
    </div>

    <div class="admin-body">

      <!-- Stats -->
      <div class="stats-bar" id="stats-bar">
        <div class="stat-card">
          <div class="stat-card-number" id="stat-total">0</div>
          <div class="stat-card-label">Affilies total</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-number" id="stat-actifs">0</div>
          <div class="stat-card-label">Actifs</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-number" id="stat-liens">0</div>
          <div class="stat-card-label">Liens generes</div>
        </div>
      </div>

      <!-- Add affiliate -->
      <div class="add-section">
        <h2>Ajouter un affilie</h2>
        <div class="add-form" id="add-form">
          <div class="field">
            <label for="add-nom">Nom complet</label>
            <input type="text" id="add-nom" placeholder="Jean Tremblay">
          </div>
          <div class="field">
            <label for="add-courriel">Courriel</label>
            <input type="email" id="add-courriel" placeholder="jean@example.com">
          </div>
          <div class="field">
            <label for="add-slug">Slug (ref ID)</label>
            <input type="text" id="add-slug" placeholder="jean-tremblay">
            <div class="slug-preview" id="slug-preview"></div>
          </div>
          <button class="btn btn-primary" onclick="addAffiliate()">Ajouter</button>
        </div>
      </div>

      <!-- Table -->
      <div class="table-section">
        <div class="table-header">
          <h2>Registre des affilies</h2>
        </div>
        <div id="table-body"></div>
      </div>

    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Hidden file input for import -->
  <input type="file" id="import-input" accept=".json" style="display:none">

  <script>
  (function () {
    'use strict';

    var STORAGE_KEY = 'adc_admin_affiliates';
    var AUTH_KEY = 'adc_admin_auth';
    var BASE_URL = 'https://affairedechiffres.com/forfait-complet.html';
    // Simple password hash (SHA-256 of the password)
    // Default password: "adc2026" — change this hash when you change the password
    var PASSWORD_HASH = '4494625e';

    // --- Simple hash (not cryptographic, just obfuscation) ---
    function simpleHash(str) {
      var hash = 0;
      for (var i = 0; i < str.length; i++) {
        var c = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + c;
        hash |= 0;
      }
      return Math.abs(hash).toString(16).substring(0, 8);
    }

    // --- Auth ---
    window.attemptLogin = function () {
      var pwd = document.getElementById('auth-password').value;
      if (simpleHash(pwd) === PASSWORD_HASH) {
        sessionStorage.setItem(AUTH_KEY, '1');
        showApp();
      } else {
        document.getElementById('auth-error').style.display = 'block';
        document.getElementById('auth-password').value = '';
        document.getElementById('auth-password').focus();
      }
    };

    // Enter key on password field
    document.getElementById('auth-password').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') window.attemptLogin();
    });

    window.logout = function () {
      sessionStorage.removeItem(AUTH_KEY);
      document.getElementById('admin-app').style.display = 'none';
      document.getElementById('auth-screen').style.display = 'flex';
    };

    function showApp() {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('admin-app').style.display = 'block';
      render();
    }

    // Check if already logged in
    if (sessionStorage.getItem(AUTH_KEY)) showApp();

    // --- Data ---
    function getData() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch (e) { return []; }
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // --- Slug generation ---
    document.getElementById('add-nom').addEventListener('input', function () {
      var slug = generateSlug(this.value);
      document.getElementById('add-slug').value = slug;
      updateSlugPreview(slug);
    });

    document.getElementById('add-slug').addEventListener('input', function () {
      this.value = this.value.toLowerCase().replace(/[^a-z0-9-]/g, '');
      updateSlugPreview(this.value);
    });

    function generateSlug(name) {
      return name
        .toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // remove accents
        .replace(/[^a-z0-9\s-]/g, '')
        .trim()
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-');
    }

    function updateSlugPreview(slug) {
      var el = document.getElementById('slug-preview');
      if (slug) {
        el.textContent = BASE_URL + '?ref=' + slug;
      } else {
        el.textContent = '';
      }
    }

    // --- Add affiliate ---
    window.addAffiliate = function () {
      var nom = document.getElementById('add-nom').value.trim();
      var courriel = document.getElementById('add-courriel').value.trim();
      var slug = document.getElementById('add-slug').value.trim();

      if (!nom || !courriel || !slug) {
        toast('Remplissez tous les champs');
        return;
      }

      var data = getData();

      // Check duplicate slug
      if (data.some(function (a) { return a.slug === slug; })) {
        toast('Ce slug existe deja : ' + slug);
        return;
      }

      data.push({
        id: Date.now().toString(36),
        nom: nom,
        courriel: courriel,
        slug: slug,
        date: new Date().toISOString().split('T')[0],
        statut: 'actif'
      });

      saveData(data);

      // Clear form
      document.getElementById('add-nom').value = '';
      document.getElementById('add-courriel').value = '';
      document.getElementById('add-slug').value = '';
      document.getElementById('slug-preview').textContent = '';

      toast('Affilie ajoute : ' + nom);
      render();
    };

    // --- Delete affiliate ---
    window.deleteAffiliate = function (id) {
      if (!confirm('Supprimer cet affilie?')) return;
      var data = getData().filter(function (a) { return a.id !== id; });
      saveData(data);
      toast('Affilie supprime');
      render();
    };

    // --- Toggle status ---
    window.toggleStatus = function (id) {
      var data = getData();
      data.forEach(function (a) {
        if (a.id === id) a.statut = a.statut === 'actif' ? 'inactif' : 'actif';
      });
      saveData(data);
      render();
    };

    // --- Copy link ---
    window.copyLink = function (slug, btnEl) {
      var url = BASE_URL + '?ref=' + slug;
      navigator.clipboard.writeText(url).then(function () {
        btnEl.textContent = 'Copie!';
        btnEl.classList.add('copied');
        setTimeout(function () {
          btnEl.textContent = 'Copier';
          btnEl.classList.remove('copied');
        }, 2000);
      });
    };

    // --- Test link ---
    window.testLink = function (slug) {
      window.open(BASE_URL.replace('https://affairedechiffres.com', window.location.origin) + '?ref=' + slug, '_blank');
    };

    // --- Export CSV ---
    window.exportCSV = function () {
      var data = getData();
      if (!data.length) { toast('Aucun affilie a exporter'); return; }

      var csv = 'ref_id,nom,courriel,date_inscription,statut,lien\n';
      data.forEach(function (a) {
        csv += [a.slug, '"' + a.nom + '"', a.courriel, a.date, a.statut, BASE_URL + '?ref=' + a.slug].join(',') + '\n';
      });

      var blob = new Blob([csv], { type: 'text/csv' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'affilies-adc-' + new Date().toISOString().split('T')[0] + '.csv';
      a.click();
      URL.revokeObjectURL(url);
      toast('CSV exporte');
    };

    // --- Import JSON ---
    window.importData = function () {
      document.getElementById('import-input').click();
    };

    document.getElementById('import-input').addEventListener('change', function (e) {
      var file = e.target.files[0];
      if (!file) return;

      var reader = new FileReader();
      reader.onload = function (ev) {
        try {
          var imported = JSON.parse(ev.target.result);
          if (!Array.isArray(imported)) throw new Error('Format invalide');

          var data = getData();
          var added = 0;
          imported.forEach(function (item) {
            if (!item.slug || !item.nom) return;
            if (data.some(function (a) { return a.slug === item.slug; })) return;
            data.push({
              id: item.id || Date.now().toString(36) + Math.random().toString(36).substr(2, 4),
              nom: item.nom,
              courriel: item.courriel || '',
              slug: item.slug,
              date: item.date || new Date().toISOString().split('T')[0],
              statut: item.statut || 'actif'
            });
            added++;
          });

          saveData(data);
          toast(added + ' affilie(s) importe(s)');
          render();
        } catch (err) {
          toast('Erreur: fichier JSON invalide');
        }
      };
      reader.readAsText(file);
      this.value = ''; // reset
    });

    // --- Render ---
    function render() {
      var data = getData();

      // Stats
      document.getElementById('stat-total').textContent = data.length;
      document.getElementById('stat-actifs').textContent = data.filter(function (a) { return a.statut === 'actif'; }).length;
      document.getElementById('stat-liens').textContent = data.length;

      // Table
      var container = document.getElementById('table-body');

      if (!data.length) {
        container.innerHTML = '<div class="empty-state"><p>Aucun affilie pour le moment. Ajoutez-en un ci-dessus.</p></div>';
        return;
      }

      var html = '<table><thead><tr>' +
        '<th>Nom</th>' +
        '<th>Lien</th>' +
        '<th>Statut</th>' +
        '<th>Date</th>' +
        '<th>Actions</th>' +
        '</tr></thead><tbody>';

      data.forEach(function (a) {
        html += '<tr>' +
          '<td><strong>' + escapeHtml(a.nom) + '</strong><br><span style="font-size:0.75rem;color:var(--ink-4)">' + escapeHtml(a.courriel) + '</span></td>' +
          '<td><div class="link-cell">' +
            '<code>?ref=' + escapeHtml(a.slug) + '</code>' +
            '<button class="copy-btn" onclick="copyLink(\'' + escapeHtml(a.slug) + '\', this)">Copier</button>' +
            '<button class="copy-btn" onclick="testLink(\'' + escapeHtml(a.slug) + '\')">Tester</button>' +
          '</div></td>' +
          '<td><span class="status-badge status-' + a.statut + '">' + a.statut + '</span></td>' +
          '<td style="font-size:0.8rem;color:var(--ink-3)">' + a.date + '</td>' +
          '<td><div class="actions-cell">' +
            '<button class="btn btn-outline btn-sm btn-icon" onclick="toggleStatus(\'' + a.id + '\')" title="Activer/Desactiver">' + (a.statut === 'actif' ? 'Pause' : 'Activer') + '</button>' +
            '<button class="btn btn-danger btn-sm btn-icon" onclick="deleteAffiliate(\'' + a.id + '\')" title="Supprimer">X</button>' +
          '</div></td>' +
          '</tr>';
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }

    // --- Helpers ---
    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function toast(msg) {
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('visible');
      setTimeout(function () { el.classList.remove('visible'); }, 3000);
    }

  })();
  </script>
</body>
</html>
